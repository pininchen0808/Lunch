<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中午吃啥</title>
    <!-- 引入 Tailwind CSS 以便快速且美觀地排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 載入中動畫 */
        .spinner {
            border: 5px solid #E0E4E8; border-top: 5px solid #E27D60;
            border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 轉盤動畫 (怎吃) */
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 20px auto; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 5px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 3s cubic-bezier(0.1, 0.8, 0.1, 1); position: relative; overflow: hidden; }
        .wheel-pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #e63946; z-index: 10; }
        .wheel-label { position: absolute; top: 50%; left: 50%; transform-origin: 0 0; font-weight: bold; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); white-space: nowrap; font-size: 15px; }

        /* 跑馬燈 (吃啥/喝啥) */
        .slot-machine { transition: all 0.3s; }
        .slot-machine.spinning { animation: pulse 0.5s infinite alternate; color: #8C98A4 !important; border-color: #8C98A4 !important; }
        @keyframes pulse { from { transform: scale(0.98); } to { transform: scale(1.02); } }

        /* 自訂側邊欄卷軸樣式 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ccc; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #aaa; }
    </style>
</head>
<body class="bg-[#FDFBF7] text-[#3E4A59] font-sans antialiased min-h-screen">
    <!-- 全畫面載入中遮罩 -->
    <div id="loading-overlay" class="fixed inset-0 bg-[#FDFBF7]/95 z-50 flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="spinner mb-4"></div>
        <h2 class="text-xl font-bold text-[#3E4A59]">連線到資料庫中...</h2>
    </div>

    <!-- 頂部導覽列 -->
    <header class="bg-white shadow-sm sticky top-0 z-40 p-4 text-center">
        <h1 class="text-2xl font-bold text-[#E27D60] mb-3">🍱 中午要吃啥 🍱</h1>
        <nav class="flex justify-center gap-2 flex-wrap">
            <button id="nav-home" class="font-bold px-4 py-2 rounded-md transition-colors bg-[#E27D60] text-white">抽抽</button>
            <button id="nav-admin" class="font-bold px-4 py-2 rounded-md transition-colors text-[#3E4A59] hover:bg-[#E27D60] hover:text-white">吃啥</button>
            <button id="nav-drink" class="font-bold px-4 py-2 rounded-md transition-colors text-[#3E4A59] hover:bg-[#41B3A3] hover:text-white">喝啥抽抽</button>
            <button id="nav-split" class="font-bold px-4 py-2 rounded-md transition-colors text-[#3E4A59] hover:bg-[#8B5CF6] hover:text-white">分帳</button>
        </nav>
    </header>

    <main class="max-w-5xl mx-auto p-4 md:p-6">
        
        <!-- ==================== 第一頁：抽籤主頁 ==================== -->
        <div id="home-view" class="flex flex-col lg:flex-row gap-6 items-start w-full">
            
            <!-- 左側 3/4：主要抽籤流程 -->
            <div class="w-full lg:w-3/4 space-y-6">
                <!-- 1. 誰抽 -->
                <div class="bg-white rounded-xl p-5 md:p-8 shadow-sm border-t-4 border-[#E27D60]">
                    <h2 class="text-lg font-bold mb-4 border-b-2 border-gray-100 pb-2">1. 誰抽籤</h2>
                    <div class="flex flex-col sm:flex-row gap-3 mb-4">
                        <input type="text" id="new-member-name" class="flex-1 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#E27D60]" placeholder="輸入新成員名稱...">
                        <button id="btn-add-member" class="bg-[#E27D60] text-white px-4 py-2 rounded-md hover:bg-[#c9654a] transition-colors whitespace-nowrap">新增成員</button>
                    </div>
                    <div id="member-list" class="flex flex-wrap gap-2 mb-4">
                        <!-- 成員標籤將由 JS 渲染 -->
                    </div>
                    <div class="text-center mt-2">
                        <button id="btn-random-member" class="bg-[#85DCB8] text-[#2c5040] px-4 py-2 rounded-md hover:bg-[#6bb996] transition-colors font-bold">🎲 隨機抽一位</button>
                    </div>
                    <div id="drawer-result" class="hidden mt-4 text-center font-bold text-lg text-[#E27D60] bg-[#fff3e0] p-3 rounded-lg"></div>
                </div>

                <!-- 2. 怎吃 -->
                <div id="step2-card" class="bg-white rounded-xl p-5 md:p-8 shadow-sm border-t-4 border-[#E27D60] opacity-40 pointer-events-none transition-opacity duration-300">
                    <h2 class="text-lg font-bold mb-4 border-b-2 border-gray-100 pb-2">2. 怎吃</h2>
                    <div class="wheel-container">
                        <div class="wheel-pointer"></div>
                        <div class="wheel" id="wheel"></div>
                    </div>
                    <div class="text-center mt-4">
                        <button id="btn-spin-wheel" class="bg-[#E27D60] text-white px-8 py-3 text-lg font-bold rounded-md hover:bg-[#c9654a] disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors shadow-md">轉動輪盤</button>
                    </div>

                    <!-- 手動選擇區塊 -->
                    <div class="mt-6 border-t border-gray-100 pt-4 flex flex-col items-center">
                        <p class="text-sm text-gray-500 mb-2">或直接手動選擇：</p>
                        <div class="flex gap-2 w-full max-w-xs">
                            <select id="manual-eat-select" class="flex-1 p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#E27D60]">
                                <option value="" disabled selected>-- 請選擇 --</option>
                                <option value="騎車買回來">騎車買回來</option>
                                <option value="騎車出去吃">騎車出去吃</option>
                                <option value="走路出去吃">走路出去吃</option>
                                <option value="訂公司午餐">訂公司午餐</option>
                                <option value="訂Uber Eats">訂Uber Eats</option>
                            </select>
                            <button id="btn-manual-eat" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-300 transition-colors font-bold whitespace-nowrap">確定</button>
                        </div>
                    </div>

                    <div id="eat-method-result" class="hidden mt-4 text-center font-bold text-xl text-[#E27D60] bg-[#fff3e0] p-3 rounded-lg"></div>
                </div>

                <!-- 誰去買 (條件顯示) -->
                <div id="step-who-rides-card" class="hidden bg-white rounded-xl p-5 md:p-8 shadow-sm border-t-4 border-[#E27D60] transition-opacity duration-300">
                    <h2 class="text-lg font-bold mb-4 border-b-2 border-gray-100 pb-2">誰去買 / 騎車？</h2>
                    <div>
                        <p class="font-bold mb-2 text-[#3E4A59]">有誰 (點擊可取消/加入)：</p>
                        <div id="eating-members-list" class="flex flex-wrap gap-2 mb-4">
                            <!-- JS 動態生成 -->
                        </div>
                    </div>
                    <div class="text-center mt-4">
                        <button id="btn-draw-riders" class="bg-[#E27D60] text-white px-6 py-2 font-bold rounded-md hover:bg-[#c9654a] transition-colors shadow-md">🛵 抽兩人去</button>
                    </div>
                    <div id="riders-result" class="hidden mt-4 text-center font-bold text-xl text-[#E27D60] bg-[#fff3e0] p-3 rounded-lg"></div>
                </div>

                <!-- 3. 吃啥 -->
                <div id="step3-card" class="bg-white rounded-xl p-5 md:p-8 shadow-sm border-t-4 border-[#E27D60] opacity-40 pointer-events-none transition-opacity duration-300">
                    <h2 class="text-lg font-bold mb-4 border-b-2 border-gray-100 pb-2">3. 吃啥</h2>
                    <p id="candidate-info" class="text-center text-gray-500 font-bold mb-2"></p>
                    
                    <div id="slot-machine" class="slot-machine text-3xl font-bold text-center text-[#E27D60] bg-[#FDFBF7] p-6 rounded-lg border-4 border-dashed border-[#E8A87C] my-4 min-h-[100px] flex items-center justify-center">
                        等待抽籤...
                    </div>
                    
                    <div id="restaurant-detail" class="hidden text-center mb-4 text-base space-y-1 bg-gray-50 p-4 rounded-md border border-gray-200">
                        <!-- 餐廳詳細資訊 -->
                    </div>

                    <div class="text-center mt-4 space-x-2">
                        <button id="btn-draw-restaurant" class="bg-[#E27D60] text-white px-6 py-2 font-bold rounded-md hover:bg-[#c9654a] disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors shadow-md">🎰 開始抽餐廳</button>
                        <button id="btn-redraw-restaurant" class="hidden bg-[#85DCB8] text-[#2c5040] px-6 py-2 font-bold rounded-md hover:bg-[#6bb996] transition-colors shadow-md">🔄 重新抽一次</button>
                    </div>
                </div>
            </div>

            <!-- 右側 1/4：抽籤紀錄側邊欄 -->
            <div class="w-full lg:w-1/4 bg-white rounded-xl p-4 shadow-sm border-t-4 border-[#E27D60] lg:sticky lg:top-24 max-h-[calc(100vh-8rem)] overflow-y-auto custom-scrollbar flex flex-col">
                <div class="flex justify-between items-center mb-3 border-b-2 border-gray-100 pb-2 sticky top-0 bg-white z-10">
                    <h2 class="text-base font-bold">📜 抽籤紀錄</h2>
                    <!-- 清空紀錄按鈕 -->
                    <button id="btn-clear-logs" class="text-xs bg-red-100 text-red-600 hover:bg-red-200 px-2 py-1 rounded transition-colors font-bold">🗑️ 清空</button>
                </div>
                <ul id="log-list" class="space-y-3 flex-1">
                    <!-- 紀錄將由 JS 渲染 -->
                </ul>
            </div>
        </div>

        <!-- ==================== 第二頁：餐廳管理 ==================== -->
        <div id="admin-view" class="hidden">
            <div class="flex flex-col md:flex-row gap-6 items-start">
                
                <!-- 新增/編輯表單 -->
                <div class="w-full md:w-1/3 bg-white rounded-xl p-5 md:p-6 shadow-sm border-t-4 border-[#E27D60] md:sticky md:top-24 z-10">
                    <h2 id="form-title" class="text-lg font-bold mb-4 border-b-2 border-gray-100 pb-2">➕ 新增餐廳</h2>
                    <form id="restaurant-form" class="space-y-4">
                        <input type="hidden" id="rest-id">
                        
                        <div>
                            <label class="block font-bold mb-1 text-sm text-[#3E4A59]">餐廳名稱</label>
                            <input type="text" id="rest-name" required placeholder="例如：我家巷口" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#E27D60]">
                        </div>
                        
                        <div>
                            <label class="block font-bold mb-1 text-sm text-[#3E4A59]">怎吃 (可複選)</label>
                            <div class="flex flex-wrap gap-3 mt-1">
                                <label class="flex items-center space-x-1 cursor-pointer text-sm"><input type="checkbox" name="eatMethod" value="騎車買回來" class="form-checkbox h-4 w-4 text-[#E27D60] rounded"><span>騎車買回來</span></label>
                                <label class="flex items-center space-x-1 cursor-pointer text-sm"><input type="checkbox" name="eatMethod" value="騎車出去吃" class="form-checkbox h-4 w-4 text-[#E27D60] rounded"><span>騎車出去吃</span></label>
                                <label class="flex items-center space-x-1 cursor-pointer text-sm"><input type="checkbox" name="eatMethod" value="走路出去吃" class="form-checkbox h-4 w-4 text-[#E27D60] rounded"><span>走路出去吃</span></label>
                                <label class="flex items-center space-x-1 cursor-pointer text-sm"><input type="checkbox" name="eatMethod" value="訂公司午餐" class="form-checkbox h-4 w-4 text-[#E27D60] rounded"><span>訂公司午餐</span></label>
                                <label class="flex items-center space-x-1 cursor-pointer text-sm"><input type="checkbox" name="eatMethod" value="訂Uber Eats" class="form-checkbox h-4 w-4 text-[#E27D60] rounded"><span>訂Uber Eats</span></label>
                            </div>
                            <p id="eat-method-error" class="text-red-500 text-xs hidden mt-1">請至少勾選一種方式</p>
                        </div>

                        <div>
                            <label class="block font-bold mb-1 text-sm text-[#3E4A59]">訂餐方式 / 電話</label>
                            <input type="text" id="rest-order-method" placeholder="例如：04-12345678 或 Uber Eats" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#E27D60]">
                        </div>

                        <div>
                            <label class="block font-bold mb-1 text-sm text-[#3E4A59]">備註</label>
                            <input type="text" id="rest-note" placeholder="例如：禮拜二公休、要提早訂" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#E27D60]">
                        </div>

                        <div class="flex flex-col xl:flex-row gap-3 pt-2">
                            <button type="submit" id="btn-submit-rest" class="flex-1 bg-[#E27D60] text-white px-4 py-2 rounded-md hover:bg-[#c9654a] transition-colors font-bold whitespace-nowrap">儲存餐廳</button>
                            <button type="button" id="btn-cancel-rest" class="hidden flex-1 bg-gray-200 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-300 transition-colors font-bold whitespace-nowrap">取消編輯</button>
                        </div>
                    </form>
                </div>

                <!-- 餐廳列表 -->
                <div class="w-full md:w-2/3 bg-white rounded-xl p-5 md:p-6 shadow-sm border-t-4 border-[#E27D60]">
                    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 border-b-2 border-gray-100 pb-2 gap-2">
                        <h2 class="text-lg font-bold">📋 餐廳列表</h2>
                        <select id="filter-eat-method" class="p-1 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#E27D60]">
                            <option value="all">全部顯示</option>
                            <option value="騎車買回來">騎車買回來</option>
                            <option value="騎車出去吃">騎車出去吃</option>
                            <option value="走路出去吃">走路出去吃</option>
                            <option value="訂公司午餐">訂公司午餐</option>
                            <option value="訂Uber Eats">訂Uber Eats</option>
                        </select>
                    </div>
                    <ul id="restaurant-list" class="space-y-3">
                        <!-- 列表將由 JS 渲染 -->
                    </ul>
                </div>

            </div>
        </div>

        <!-- ==================== 第三頁：喝啥 (飲料頁) ==================== -->
        <div id="drink-view" class="hidden space-y-6">
            
            <!-- 上半部：抽飲料系統 -->
            <div class="bg-white rounded-xl p-5 md:p-8 shadow-sm border-t-4 border-[#41B3A3]">
                <h2 class="text-lg font-bold mb-4 border-b-2 border-gray-100 pb-2 text-[#41B3A3]">🧋 喝啥</h2>
                
                <p id="drink-candidate-info" class="text-center text-gray-500 font-bold mb-2">準備開抽...</p>
                
                <div id="drink-slot-machine" class="slot-machine text-3xl font-bold text-center text-[#41B3A3] bg-[#FDFBF7] p-6 rounded-lg border-4 border-dashed border-[#85DCB8] my-4 min-h-[100px] flex items-center justify-center">
                    等待抽籤...
                </div>
                
                <div id="drink-detail" class="hidden text-center mb-4 text-base space-y-1 bg-gray-50 p-4 rounded-md border border-gray-200">
                    <!-- 飲料詳細資訊 -->
                </div>

                <div class="text-center mt-4 space-x-2">
                    <button id="btn-draw-drink" class="bg-[#41B3A3] text-white px-8 py-3 text-lg font-bold rounded-md hover:bg-[#349588] disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors shadow-md">🥤 開始抽飲料</button>
                </div>
            </div>

            <!-- 下半部：飲料管理 -->
            <div class="flex flex-col md:flex-row gap-6 items-start">
                
                <div class="w-full md:w-1/3 bg-white rounded-xl p-5 md:p-6 shadow-sm border-t-4 border-[#41B3A3] md:sticky md:top-24 z-10">
                    <h2 id="drink-form-title" class="text-lg font-bold mb-4 border-b-2 border-gray-100 pb-2">➕ 新增飲料店</h2>
                    <form id="drink-form" class="space-y-4">
                        <input type="hidden" id="drink-id">
                        
                        <div>
                            <label class="block font-bold mb-1 text-sm text-[#3E4A59]">飲料店名 (必填)</label>
                            <input type="text" id="drink-name" required placeholder="例如：八曜和茶" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#41B3A3]">
                        </div>

                        <div>
                            <label class="block font-bold mb-1 text-sm text-[#3E4A59]">分店名</label>
                            <input type="text" id="drink-branch" placeholder="例如：西屯店" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#41B3A3]">
                        </div>

                        <div>
                            <label class="block font-bold mb-1 text-sm text-[#3E4A59]">備註</label>
                            <input type="text" id="drink-note" placeholder="例如：滿$250外送" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#41B3A3]">
                        </div>

                        <div class="flex flex-col xl:flex-row gap-3 pt-2">
                            <button type="submit" id="btn-submit-drink" class="flex-1 bg-[#41B3A3] text-white px-4 py-2 rounded-md hover:bg-[#349588] transition-colors font-bold whitespace-nowrap">儲存飲料店</button>
                            <button type="button" id="btn-cancel-drink" class="hidden flex-1 bg-gray-200 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-300 transition-colors font-bold whitespace-nowrap">取消</button>
                        </div>
                    </form>
                </div>

                <div class="w-full md:w-2/3 bg-white rounded-xl p-5 md:p-6 shadow-sm border-t-4 border-[#41B3A3]">
                    <h2 class="text-lg font-bold mb-4 border-b-2 border-gray-100 pb-2">📋 飲料店列表</h2>
                    <ul id="drink-list" class="space-y-3">
                        <!-- 飲料列表將由 JS 渲染 -->
                    </ul>
                </div>

            </div>
        </div>

        <!-- ==================== 第四頁：分帳功能 ==================== -->
        <div id="split-view" class="hidden">
            <div class="flex flex-col md:flex-row gap-6 items-start">
                
                <div class="w-full md:w-1/3 bg-white rounded-xl p-5 md:p-6 shadow-sm border-t-4 border-[#8B5CF6] md:sticky md:top-24 z-10">
                    <h2 class="text-lg font-bold mb-4 border-b-2 border-gray-100 pb-2 text-[#8B5CF6]">💰 新增分帳</h2>
                    <form id="split-form" class="space-y-4">
                        <div>
                            <label class="block font-bold mb-1 text-sm text-[#3E4A59]">名目 (例如：八曜和茶)</label>
                            <input type="text" id="split-title" required class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#8B5CF6]">
                        </div>

                        <div>
                            <label class="block font-bold mb-1 text-sm text-[#3E4A59]">總金額</label>
                            <input type="number" id="split-amount" required min="1" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#8B5CF6]">
                        </div>

                        <div>
                            <label class="block font-bold mb-1 text-sm text-[#3E4A59]">代墊者 (誰先付錢)</label>
                            <select id="split-payer" required class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-[#8B5CF6]">
                                <option value="" disabled selected>-- 請選擇 --</option>
                            </select>
                        </div>

                        <div>
                            <label class="block font-bold mb-1 text-sm text-[#3E4A59]">分攤人員 (預設全選)</label>
                            <div id="split-participants" class="flex flex-wrap mt-1 gap-y-2">
                                <!-- JS動態產生 -->
                            </div>
                            <p id="split-participants-error" class="text-red-500 text-xs hidden mt-1">請至少勾選一位分攤人員</p>
                        </div>

                        <div class="pt-2">
                            <button type="submit" id="btn-submit-split" class="w-full bg-[#8B5CF6] text-white px-4 py-2 rounded-md hover:bg-[#7C3AED] transition-colors font-bold whitespace-nowrap">新增並平均分攤</button>
                        </div>
                    </form>
                </div>

                <div class="w-full md:w-2/3 flex flex-col gap-6">
                    <!-- 新增總結算區塊 -->
                    <div class="bg-white rounded-xl p-5 md:p-6 shadow-sm border-t-4 border-[#8B5CF6]">
                        <h2 class="text-lg font-bold mb-4 border-b-2 border-gray-100 pb-2">📊 總結算</h2>
                        <div id="split-summary" class="flex flex-wrap gap-3">
                            <!-- JS 渲染抵銷後的總結算 -->
                        </div>
                    </div>

                    <!-- 分帳詳細紀錄 -->
                    <div class="bg-white rounded-xl p-5 md:p-6 shadow-sm border-t-4 border-[#8B5CF6]">
                        <h2 class="text-lg font-bold mb-4 border-b-2 border-gray-100 pb-2">🧾 詳細分帳紀錄</h2>
                        <ul id="split-list" class="space-y-3">
                            <!-- JS 渲染 -->
                        </ul>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <!-- 邏輯腳本區塊 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, updateDoc, doc, onSnapshot, serverTimestamp, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js"; 

        // ==========================================
        // Firebase 設定與初始化
        // ==========================================
        let firebaseConfig = {
            apiKey: "AIzaSyAkG7x4kvK39GpIDFhGkZrq2x-GgtMQuCI",
            authDomain: "eat-lunch-77afb.firebaseapp.com",
            projectId: "eat-lunch-77afb",
            storageBucket: "eat-lunch-77afb.firebasestorage.app",
            messagingSenderId: "974891275410",
            appId: "1:974891275410:web:fa73c543f969117a93824b",
            measurementId: "G-DDSG3MRKZZ"
        };
        
        const app = initializeApp(firebaseConfig);
        try { const analytics = getAnalytics(app); } catch (err) {}

        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lunch-drawer-app';

        const getDbCol = (colName) => collection(db, 'artifacts', appId, 'public', 'data', colName);
        const getDbDoc = (colName, docId) => doc(db, 'artifacts', appId, 'public', 'data', colName, docId);

        // ==========================================
        // 狀態管理
        // ==========================================
        let currentUser = null;
        const state = {
            members: [],
            restaurants: [],
            drinks: [],
            bills: [],
            logs: [],
            selectedDrawer: null,
            eatMethods: ["騎車買回來", "騎車出去吃", "走路出去吃", "訂公司午餐", "訂Uber Eats"],
            selectedEatMethod: null,
            candidateRestaurants: [],
            selectedRestaurant: null,
            selectedDrink: null,
            eatingMembers: [],
            selectedRiders: null
        };

        // UI 工具
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 text-white px-6 py-4 rounded-lg shadow-lg z-50 transition-opacity duration-300 font-bold ${isError ? 'bg-red-600' : 'bg-green-500'}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            const displayTime = isError ? 6000 : 3000;
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, displayTime);
        }

        function formatDate(date) {
            if (!date) return "";
            const pad = (n) => (n < 10 ? '0' + n : n);
            return `${date.getFullYear()}/${pad(date.getMonth() + 1)}/${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        // ==========================================
        // 系統啟動與驗證
        // ==========================================
        const initSystem = async () => {
            try {
                await signInAnonymously(auth);
            } catch (err) {
                console.error("驗證失敗:", err);
                document.querySelector('#loading-overlay .spinner').style.display = 'none';
                document.querySelector('#loading-overlay h2').innerHTML = `<span style="color:#e63946;">連線失敗，請檢查網路或權限！</span>`;
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user && !currentUser) {
                currentUser = user;
                document.getElementById('loading-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('loading-overlay').classList.add('hidden'), 300);
                startDataListeners();
                setupWheel();
            }
        });

        const handleFirestoreError = (err, context) => {
            console.error(`[${context}] 讀取錯誤:`, err);
            if (err.code === 'permission-denied') showToast(`❌ 同步失敗 (${context})：Firestore 權限不足！`, true);
        };

        // ==========================================
        // 資料監聽 (多人即時同步)
        // ==========================================
        let hasInitializedDefaultMembers = false;
        function startDataListeners() {
            if (!currentUser) return;

            // 1. 監聽成員
            onSnapshot(getDbCol('members'), (snap) => {
                state.members = [];
                snap.forEach(d => { if (d.data().active !== false) state.members.push({ id: d.id, ...d.data() }); });
                state.members.sort((a, b) => (a.createdAt?.toMillis?.() || 0) - (b.createdAt?.toMillis?.() || 0));
                
                if (state.members.length === 0 && !hasInitializedDefaultMembers) {
                    hasInitializedDefaultMembers = true;
                    ['品', '柔', 'Yo'].forEach(name => {
                        addDoc(getDbCol('members'), { name, active: true, createdAt: serverTimestamp() }).catch(e=>console.warn(e));
                    });
                }
                renderMembers();
                updateSplitMembersUI(); 
            }, (err) => handleFirestoreError(err, '成員'));

            // 2. 監聽餐廳
            onSnapshot(getDbCol('restaurants'), (snap) => {
                state.restaurants = [];
                snap.forEach(d => { if (d.data().active !== false) state.restaurants.push({ id: d.id, ...d.data() }); });
                state.restaurants.sort((a, b) => (a.createdAt?.toMillis?.() || 0) - (b.createdAt?.toMillis?.() || 0));
                renderRestaurantList();
            }, (err) => handleFirestoreError(err, '餐廳'));

            // 3. 監聽飲料 
            onSnapshot(getDbCol('drinks'), (snap) => {
                state.drinks = [];
                snap.forEach(d => { if (d.data().active !== false) state.drinks.push({ id: d.id, ...d.data() }); });
                state.drinks.sort((a, b) => (a.createdAt?.toMillis?.() || 0) - (b.createdAt?.toMillis?.() || 0));
                renderDrinkList();
                updateDrinkDrawStatus(); 
            }, (err) => handleFirestoreError(err, '飲料'));

            // 4. 監聽抽籤紀錄
            onSnapshot(getDbCol('drawLogs'), (snap) => {
                state.logs = [];
                snap.forEach(d => state.logs.push({ id: d.id, ...d.data() }));
                state.logs.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
                renderLogs(state.logs.slice(0, 50)); 
            }, (err) => handleFirestoreError(err, '紀錄'));

            // 5. 監聽分帳紀錄
            onSnapshot(getDbCol('bills'), (snap) => {
                state.bills = [];
                snap.forEach(d => { if (d.data().active !== false) state.bills.push({ id: d.id, ...d.data() }); });
                state.bills.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
                renderBills();
            }, (err) => handleFirestoreError(err, '分帳'));
        }

        // ==========================================
        // 視圖切換邏輯
        // ==========================================
        const views = {
            home: document.getElementById('home-view'),
            admin: document.getElementById('admin-view'),
            drink: document.getElementById('drink-view'),
            split: document.getElementById('split-view')
        };
        const navBtns = {
            home: document.getElementById('nav-home'),
            admin: document.getElementById('nav-admin'),
            drink: document.getElementById('nav-drink'),
            split: document.getElementById('nav-split')
        };

        function switchView(viewName) {
            Object.keys(views).forEach(k => {
                if (k === viewName) {
                    views[k].classList.remove('hidden');
                    if(k === 'home') {
                        navBtns[k].className = "font-bold px-4 py-2 rounded-md transition-colors bg-[#E27D60] text-white";
                        views[k].classList.add('flex');
                    }
                    else if(k === 'admin') navBtns[k].className = "font-bold px-4 py-2 rounded-md transition-colors bg-[#E27D60] text-white";
                    else if(k === 'drink') navBtns[k].className = "font-bold px-4 py-2 rounded-md transition-colors bg-[#41B3A3] text-white";
                    else if(k === 'split') navBtns[k].className = "font-bold px-4 py-2 rounded-md transition-colors bg-[#8B5CF6] text-white";
                } else {
                    views[k].classList.add('hidden');
                    if (k === 'home') views[k].classList.remove('flex');
                    if(k === 'drink') navBtns[k].className = "font-bold px-4 py-2 rounded-md transition-colors text-[#3E4A59] hover:bg-[#41B3A3] hover:text-white";
                    else if(k === 'split') navBtns[k].className = "font-bold px-4 py-2 rounded-md transition-colors text-[#3E4A59] hover:bg-[#8B5CF6] hover:text-white";
                    else navBtns[k].className = "font-bold px-4 py-2 rounded-md transition-colors text-[#3E4A59] hover:bg-[#E27D60] hover:text-white";
                }
            });
        }
        navBtns.home.onclick = () => switchView('home');
        navBtns.admin.onclick = () => switchView('admin');
        navBtns.drink.onclick = () => switchView('drink');
        navBtns.split.onclick = () => switchView('split');

        // ==========================================
        // 區塊：誰抽籤
        // ==========================================
        const DOM_members = document.getElementById("member-list");
        const DOM_newMember = document.getElementById("new-member-name");

        window.deleteMember = async (id, name) => {
            if(confirm(`確定要刪除成員「${name}」嗎？`)) {
                try {
                    await updateDoc(getDbDoc("members", id), { active: false });
                    showToast(`🗑️ 已刪除成員「${name}」`);
                    if (state.selectedDrawer === name) {
                        state.selectedDrawer = null;
                        document.getElementById("drawer-result").classList.add("hidden");
                        document.getElementById("step2-card").classList.add("opacity-40", "pointer-events-none");
                    }
                } catch(e) {
                    showToast("❌ 刪除失敗，請檢查權限", true);
                }
            }
        };

        function renderMembers() {
            DOM_members.innerHTML = "";
            state.members.forEach(m => {
                const wrapper = document.createElement("div");
                const isSelected = state.selectedDrawer === m.name;
                
                wrapper.className = `inline-flex items-stretch rounded-full border transition-colors overflow-hidden ${isSelected ? 'bg-[#E27D60] text-white border-[#E27D60]' : 'bg-[#FDFBF7] text-[#3E4A59] border-[#E0E4E8] hover:border-[#E8A87C]'}`;

                const nameBtn = document.createElement("button");
                nameBtn.className = `px-3 py-1.5 font-bold transition-colors ${isSelected ? 'hover:bg-[#c9654a]' : 'hover:bg-[#E8A87C] hover:text-white'}`;
                nameBtn.textContent = m.name;
                nameBtn.onclick = () => {
                    state.selectedDrawer = m.name;
                    renderMembers();
                    document.getElementById("drawer-result").textContent = `🙋‍♂️ 本次抽籤者：${m.name}`;
                    document.getElementById("drawer-result").classList.remove("hidden");
                    document.getElementById("step2-card").classList.remove("opacity-40", "pointer-events-none");
                };

                const delBtn = document.createElement("button");
                delBtn.className = `px-2 py-1.5 text-xs flex items-center justify-center transition-colors ${isSelected ? 'text-white hover:bg-[#c9654a]' : 'text-gray-400 hover:text-red-500 hover:bg-gray-100'}`;
                delBtn.innerHTML = "✖";
                delBtn.onclick = (e) => {
                    e.stopPropagation(); 
                    deleteMember(m.id, m.name);
                };

                wrapper.appendChild(nameBtn);
                wrapper.appendChild(delBtn);
                DOM_members.appendChild(wrapper);
            });
        }

        document.getElementById("btn-add-member").onclick = async () => {
            const name = DOM_newMember.value.trim();
            if (!name || state.members.some(m => m.name === name)) return;
            await addDoc(getDbCol('members'), { name, active: true, createdAt: serverTimestamp() });
            DOM_newMember.value = "";
        };

        document.getElementById("btn-random-member").onclick = () => {
            if(state.members.length === 0) return;
            const rnd = state.members[Math.floor(Math.random() * state.members.length)];
            state.selectedDrawer = rnd.name;
            renderMembers();
            document.getElementById("drawer-result").textContent = `🙋‍♂️ 本次抽籤者：${rnd.name}`;
            document.getElementById("drawer-result").classList.remove("hidden");
            document.getElementById("step2-card").classList.remove("opacity-40", "pointer-events-none");
        };

        // ==========================================
        // 區塊：怎吃 (轉盤與手動)
        // ==========================================
        const DOM_wheel = document.getElementById("wheel");
        function setupWheel() {
            DOM_wheel.innerHTML = '';
            const slices = state.eatMethods.length;
            const degree = 360 / slices;
            const wheelColors = ["#E27D60", "#85DCB8", "#E8A87C", "#C38D9E", "#41B3A3"];
            let gradientParts = [];
            state.eatMethods.forEach((method, i) => {
                const start = i * degree;
                const end = start + degree;
                gradientParts.push(`${wheelColors[i]} ${start}deg ${end}deg`);
                const label = document.createElement("div");
                label.className = "wheel-label";
                label.style.transform = `rotate(${start + (degree / 2) - 90}deg) translate(45px, -50%)`; 
                label.textContent = method;
                DOM_wheel.appendChild(label);
            });
            DOM_wheel.style.background = `conic-gradient(${gradientParts.join(", ")})`;
        }

        let currentRotation = 0;

        function processEatMethod(method) {
            state.selectedEatMethod = method;
            document.getElementById("eat-method-result").textContent = `🛵 今天怎吃：${state.selectedEatMethod}`;
            document.getElementById("eat-method-result").classList.remove("hidden");
            
            const whoRidesCard = document.getElementById("step-who-rides-card");
            if (method === "騎車出去吃" || method === "騎車買回來") {
                whoRidesCard.classList.remove("hidden");
                state.eatingMembers = state.members.map(m => m.name);
                state.selectedRiders = null;
                document.getElementById("riders-result").classList.add("hidden");
                renderEatingMembers();
            } else {
                whoRidesCard.classList.add("hidden");
                state.selectedRiders = null;
            }

            prepareSlotMachine();
        }

        document.getElementById("btn-spin-wheel").onclick = () => {
            if (!state.selectedDrawer) return showToast("請先在第一步選擇誰要抽籤！", true);
            document.getElementById("btn-spin-wheel").disabled = true;
            document.getElementById("btn-manual-eat").disabled = true;
            document.getElementById("eat-method-result").classList.add("hidden");
            document.getElementById("step3-card").classList.add("opacity-40", "pointer-events-none");
            document.getElementById("step-who-rides-card").classList.add("hidden");
            
            const targetIndex = Math.floor(Math.random() * state.eatMethods.length);
            const sliceDegree = 360 / state.eatMethods.length;
            const targetDegree = 360 - (targetIndex * sliceDegree) - (sliceDegree / 2);
            currentRotation = currentRotation + (360 * 5) + (targetDegree - (currentRotation % 360));
            DOM_wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                document.getElementById("btn-spin-wheel").disabled = false;
                document.getElementById("btn-manual-eat").disabled = false;
                processEatMethod(state.eatMethods[targetIndex]);
            }, 3000);
        };

        const handleManualEat = () => {
            if (!state.selectedDrawer) {
                document.getElementById("manual-eat-select").value = "";
                return showToast("請先在第一步選擇誰要抽籤！", true);
            }
            const selected = document.getElementById("manual-eat-select").value;
            if (!selected) return;
            processEatMethod(selected);
            
            setTimeout(() => {
                const targetId = (selected === "騎車出去吃" || selected === "騎車買回來") 
                    ? "step-who-rides-card" 
                    : "step3-card";
                document.getElementById(targetId).scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        };

        document.getElementById("btn-manual-eat").onclick = handleManualEat;
        document.getElementById("manual-eat-select").onchange = handleManualEat;

        function renderEatingMembers() {
            const container = document.getElementById("eating-members-list");
            container.innerHTML = "";
            state.members.forEach(m => {
                const btn = document.createElement("button");
                const isEating = state.eatingMembers.includes(m.name);
                btn.className = `px-4 py-2 rounded-full border transition-colors font-bold ${isEating ? 'bg-[#41B3A3] text-white border-[#41B3A3]' : 'bg-[#FDFBF7] text-gray-400 border-gray-300 hover:bg-gray-200 hover:text-gray-600'}`;
                btn.textContent = m.name;
                btn.onclick = () => {
                    if (isEating) {
                        state.eatingMembers = state.eatingMembers.filter(name => name !== m.name);
                    } else {
                        state.eatingMembers.push(m.name);
                    }
                    renderEatingMembers();
                };
                container.appendChild(btn);
            });
        }

        document.getElementById("btn-draw-riders").onclick = () => {
            if (state.eatingMembers.length < 2) {
                return showToast("請至少保留兩個人有吃才能抽喔！", true);
            }
            const shuffled = [...state.eatingMembers].sort(() => 0.5 - Math.random());
            state.selectedRiders = shuffled.slice(0, 2);
            
            const resDiv = document.getElementById("riders-result");
            resDiv.innerHTML = `🛵 負責去的人：<br><span class="text-2xl mt-2 inline-block">${state.selectedRiders.join(" & ")}</span>`;
            resDiv.classList.remove("hidden");
            
            setTimeout(() => {
                document.getElementById("step3-card").scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        };

        // ==========================================
        // 區塊：吃啥 (跑馬燈)
        // ==========================================
        function prepareSlotMachine() {
            document.getElementById("step3-card").classList.remove("opacity-40", "pointer-events-none");
            document.getElementById("slot-machine").textContent = "等待抽籤...";
            document.getElementById("restaurant-detail").classList.add("hidden");
            document.getElementById("btn-redraw-restaurant").classList.add("hidden");
            document.getElementById("btn-draw-restaurant").classList.remove("hidden");
            
            state.candidateRestaurants = state.restaurants.filter(r => {
                const methods = Array.isArray(r.eatMethod) ? r.eatMethod : [r.eatMethod];
                return methods.includes(state.selectedEatMethod);
            });
            
            const btn = document.getElementById("btn-draw-restaurant");
            if (state.candidateRestaurants.length === 0) {
                document.getElementById("candidate-info").textContent = `⚠️ 目前沒有符合的餐廳。`;
                btn.disabled = true;
            } else {
                document.getElementById("candidate-info").textContent = `🎯 共有 ${state.candidateRestaurants.length} 家候選餐廳！`;
                btn.disabled = false;
            }
        }

        function runSlotMachine() {
            if (state.candidateRestaurants.length === 0) return;

            if ((state.selectedEatMethod === "騎車出去吃" || state.selectedEatMethod === "騎車買回來") && !state.selectedRiders) {
                return showToast("請先在上方點擊「抽兩人去」決定派誰去買喔！", true);
            }

            document.getElementById("btn-draw-restaurant").disabled = true;
            document.getElementById("btn-redraw-restaurant").disabled = true;
            document.getElementById("slot-machine").classList.add("spinning");
            document.getElementById("restaurant-detail").classList.add("hidden");

            let spins = 0;
            const interval = setInterval(() => {
                const ri = Math.floor(Math.random() * state.candidateRestaurants.length);
                document.getElementById("slot-machine").textContent = state.candidateRestaurants[ri].name;
                spins++;
                if (spins >= 25) {
                    clearInterval(interval);
                    finishSlotMachine(ri);
                }
            }, 80);
        }

        async function finishSlotMachine(winnerIndex) {
            document.getElementById("slot-machine").classList.remove("spinning");
            state.selectedRestaurant = state.candidateRestaurants[winnerIndex];
            document.getElementById("slot-machine").textContent = `🎉 ${state.selectedRestaurant.name} 🎉`;
            document.getElementById("restaurant-detail").innerHTML = `
                <p><span class="font-bold text-gray-700">訂餐方式：</span> ${state.selectedRestaurant.orderMethod || '無'}</p>
                <p><span class="font-bold text-gray-700">備註：</span> ${state.selectedRestaurant.note || '無'}</p>
            `;
            document.getElementById("restaurant-detail").classList.remove("hidden");
            document.getElementById("btn-draw-restaurant").classList.add("hidden");
            document.getElementById("btn-redraw-restaurant").classList.remove("hidden");
            document.getElementById("btn-redraw-restaurant").disabled = false;

            try {
                await addDoc(getDbCol("drawLogs"), {
                    drawerName: state.selectedDrawer,
                    eatMethod: state.selectedEatMethod,
                    restaurantId: state.selectedRestaurant.id,
                    restaurantName: state.selectedRestaurant.name,
                    riders: state.selectedRiders || null,
                    createdAt: serverTimestamp()
                });
            } catch (err) {}
        }
        document.getElementById("btn-draw-restaurant").onclick = runSlotMachine;
        document.getElementById("btn-redraw-restaurant").onclick = runSlotMachine;

        // ==========================================
        // 右側側邊欄：小紀錄渲染與刪除功能
        // ==========================================
        function renderLogs(recentLogs) {
            const DOM_logs = document.getElementById("log-list");
            DOM_logs.innerHTML = "";
            
            if (recentLogs.length === 0) {
                DOM_logs.innerHTML = "<p class='text-sm text-gray-400 text-center py-4'>尚無紀錄</p>";
                return;
            }

            recentLogs.forEach(data => {
                const li = document.createElement("li");
                li.className = "flex flex-col bg-gray-50 border border-gray-200 p-3 rounded-lg";
                
                let dateObj = new Date();
                if (data.createdAt?.toDate) dateObj = data.createdAt.toDate();
                else if (data.createdAt?.toMillis) dateObj = new Date(data.createdAt.toMillis());

                const isDrink = data.eatMethod === "喝飲料";
                const ridersText = data.riders ? `<br><span class="text-[#E27D60] font-bold inline-block mt-1">🛵 ${data.riders.join(" & ")} 去買</span>` : '';
                
                li.innerHTML = `
                    <div class="mb-1">
                        <h4 class="font-bold text-base text-[#3E4A59] leading-tight">${data.restaurantName}</h4>
                        <span class="text-xs font-normal ${isDrink ? 'text-[#41B3A3]' : 'text-gray-500'}">(${data.eatMethod || '無'})${ridersText}</span>
                    </div>
                    <div class="flex justify-between items-end mt-1">
                        <span class="text-xs text-gray-500 font-bold">🧑 ${data.drawerName || '未指定'}</span>
                        <span class="text-[10px] text-gray-400 font-mono tracking-tighter">🕒 ${formatDate(dateObj)}</span>
                    </div>
                `;
                DOM_logs.appendChild(li);
            });
        }

        document.getElementById("btn-clear-logs").onclick = async () => {
            if (!confirm("確定要清空所有抽籤紀錄嗎？這無法復原喔！")) return;

            const btn = document.getElementById("btn-clear-logs");
            btn.disabled = true;
            btn.textContent = "清空中...";

            try {
                const snapshot = await getDocs(getDbCol('drawLogs'));
                const deletePromises = [];
                snapshot.forEach(d => {
                    deletePromises.push(deleteDoc(d.ref));
                });
                
                await Promise.all(deletePromises);
                showToast("🗑️ 已清空所有抽籤紀錄！");
            } catch (error) {
                console.error("清空紀錄失敗:", error);
                showToast("❌ 清空失敗，請檢查權限。", true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = "🗑️ 清空";
            }
        };

        // ==========================================
        // 餐廳管理功能
        // ==========================================
        function renderRestaurantList() {
            const DOM_restList = document.getElementById("restaurant-list");
            const filterVal = document.getElementById("filter-eat-method").value;
            DOM_restList.innerHTML = "";
            let filtered = state.restaurants;
            
            if (filterVal !== "all") {
                filtered = state.restaurants.filter(r => {
                    const methods = Array.isArray(r.eatMethod) ? r.eatMethod : [r.eatMethod];
                    return methods.includes(filterVal);
                });
            }

            if (filtered.length === 0) {
                DOM_restList.innerHTML = "<p class='text-center py-6 text-gray-400'>目前沒有符合的餐廳資料。</p>";
                return;
            }
            filtered.forEach(rest => {
                const li = document.createElement("li");
                li.className = "flex flex-col sm:flex-row justify-between sm:items-center bg-gray-50 border border-gray-200 p-4 rounded-lg gap-3";
                
                const methods = Array.isArray(rest.eatMethod) ? rest.eatMethod : [rest.eatMethod];
                const methodTags = methods.map(m => `<span class="bg-[#FDFBF7] px-2 py-1 rounded text-xs text-gray-600 border border-gray-200">📌 ${m}</span>`).join('');
                
                li.innerHTML = `
                    <div class="flex-1">
                        <h4 class="font-bold text-lg text-[#3E4A59]">${rest.name}</h4>
                        <div class="flex flex-wrap gap-2 mt-2">
                            ${methodTags}
                            <span class="bg-[#eef] px-2 py-1 rounded text-xs text-gray-600 border border-blue-100">📞 ${rest.orderMethod || '無'}</span>
                            <span class="bg-gray-100 px-2 py-1 rounded text-xs text-gray-600 border border-gray-200">📝 ${rest.note || '無'}</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="bg-gray-200 text-gray-700 px-3 py-1 rounded-md hover:bg-gray-300" onclick="editRestaurant('${rest.id}')">編輯</button>
                        <button class="bg-[#e63946] text-white px-3 py-1 rounded-md hover:bg-red-700" onclick="deleteRestaurant('${rest.id}')">刪除</button>
                    </div>
                `;
                DOM_restList.appendChild(li);
            });
        }
        document.getElementById("filter-eat-method").onchange = renderRestaurantList;

        document.getElementById("restaurant-form").onsubmit = async (e) => {
            e.preventDefault();
            
            const checkedMethods = Array.from(document.querySelectorAll('input[name="eatMethod"]:checked')).map(cb => cb.value);
            if (checkedMethods.length === 0) {
                document.getElementById('eat-method-error').classList.remove('hidden');
                return;
            }
            document.getElementById('eat-method-error').classList.add('hidden');

            const id = document.getElementById("rest-id").value;
            const data = {
                name: document.getElementById("rest-name").value.trim(),
                eatMethod: checkedMethods, 
                orderMethod: document.getElementById("rest-order-method").value.trim(),
                note: document.getElementById("rest-note").value.trim(),
                active: true
            };
            document.getElementById("btn-submit-rest").disabled = true;
            try {
                if (id) {
                    data.updatedAt = serverTimestamp();
                    await updateDoc(getDbDoc("restaurants", id), data);
                    showToast("✅ 更新餐廳成功！");
                } else {
                    data.createdAt = serverTimestamp();
                    await addDoc(getDbCol("restaurants"), data);
                    showToast("✅ 新增餐廳成功！");
                }
                document.getElementById("restaurant-form").reset();
                document.getElementById('eat-method-error').classList.add('hidden');
                document.getElementById("rest-id").value = "";
                document.getElementById("form-title").textContent = "➕ 新增餐廳";
                document.getElementById("btn-submit-rest").textContent = "儲存餐廳";
                document.getElementById("btn-cancel-rest").classList.add("hidden");
            } catch (error) { showToast("❌ 儲存失敗", true); }
            document.getElementById("btn-submit-rest").disabled = false;
        };

        window.editRestaurant = (id) => {
            const rest = state.restaurants.find(r => r.id === id);
            if (!rest) return;
            document.getElementById("form-title").textContent = "✏️ 編輯餐廳";
            document.getElementById("rest-id").value = rest.id;
            document.getElementById("rest-name").value = rest.name;
            
            const methods = Array.isArray(rest.eatMethod) ? rest.eatMethod : [rest.eatMethod];
            document.querySelectorAll('input[name="eatMethod"]').forEach(cb => {
                cb.checked = methods.includes(cb.value);
            });
            document.getElementById('eat-method-error').classList.add('hidden');

            document.getElementById("rest-order-method").value = rest.orderMethod || "";
            document.getElementById("rest-note").value = rest.note || "";
            document.getElementById("btn-submit-rest").textContent = "更新餐廳";
            document.getElementById("btn-cancel-rest").classList.remove("hidden");
            window.scrollTo({ top: 0, behavior: "smooth" });
        };

        window.deleteRestaurant = async (id) => {
            if(confirm("確定刪除這家餐廳嗎？")) {
                await updateDoc(getDbDoc("restaurants", id), { active: false });
                showToast("🗑️ 已刪除餐廳");
            }
        };

        document.getElementById("btn-cancel-rest").onclick = () => {
            document.getElementById("restaurant-form").reset();
            document.getElementById('eat-method-error').classList.add('hidden');
            document.getElementById("rest-id").value = "";
            document.getElementById("form-title").textContent = "➕ 新增餐廳";
            document.getElementById("btn-submit-rest").textContent = "儲存餐廳";
            document.getElementById("btn-cancel-rest").classList.add("hidden");
        };

        // ==========================================
        // 喝啥 (飲料管理與抽籤)
        // ==========================================
        function renderDrinkList() {
            const DOM_drinkList = document.getElementById("drink-list");
            DOM_drinkList.innerHTML = "";

            if (state.drinks.length === 0) {
                DOM_drinkList.innerHTML = "<p class='text-center py-6 text-gray-400'>目前沒有飲料店資料，趕快新增一家吧！</p>";
                return;
            }

            state.drinks.forEach(drink => {
                const li = document.createElement("li");
                li.className = "flex flex-col sm:flex-row justify-between sm:items-center bg-gray-50 border border-gray-200 p-4 rounded-lg gap-3";
                li.innerHTML = `
                    <div class="flex-1">
                        <h4 class="font-bold text-lg text-[#3E4A59]">${drink.name} <span class="text-sm text-[#41B3A3] font-normal">${drink.branch ? `(${drink.branch})` : ''}</span></h4>
                        <div class="flex flex-wrap gap-2 mt-2">
                            ${drink.note ? `<span class="bg-gray-100 px-2 py-1 rounded text-xs text-gray-600 border border-gray-200">📝 ${drink.note}</span>` : ''}
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button class="bg-gray-200 text-gray-700 px-3 py-1 rounded-md hover:bg-gray-300" onclick="editDrink('${drink.id}')">編輯</button>
                        <button class="bg-[#e63946] text-white px-3 py-1 rounded-md hover:bg-red-700" onclick="deleteDrink('${drink.id}')">刪除</button>
                    </div>
                `;
                DOM_drinkList.appendChild(li);
            });
        }

        document.getElementById("drink-form").onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById("drink-id").value;
            const data = {
                name: document.getElementById("drink-name").value.trim(),
                branch: document.getElementById("drink-branch").value.trim(),
                note: document.getElementById("drink-note").value.trim(),
                active: true
            };
            
            document.getElementById("btn-submit-drink").disabled = true;
            try {
                if (id) {
                    data.updatedAt = serverTimestamp();
                    await updateDoc(getDbDoc("drinks", id), data);
                    showToast("✅ 更新飲料店成功！");
                } else {
                    data.createdAt = serverTimestamp();
                    await addDoc(getDbCol("drinks"), data);
                    showToast("✅ 新增飲料店成功！");
                }
                resetDrinkForm();
            } catch (error) { showToast("❌ 儲存失敗", true); }
            document.getElementById("btn-submit-drink").disabled = false;
        };

        window.editDrink = (id) => {
            const drink = state.drinks.find(d => d.id === id);
            if (!drink) return;
            document.getElementById("drink-form-title").textContent = "✏️ 編輯飲料店";
            document.getElementById("drink-id").value = drink.id;
            document.getElementById("drink-name").value = drink.name;
            document.getElementById("drink-branch").value = drink.branch || "";
            document.getElementById("drink-note").value = drink.note || "";
            
            document.getElementById("btn-submit-drink").textContent = "更新飲料店";
            document.getElementById("btn-cancel-drink").classList.remove("hidden");
            window.scrollTo({ top: 0, behavior: "smooth" });
        };

        window.deleteDrink = async (id) => {
            if(confirm("確定刪除這家飲料店嗎？")) {
                await updateDoc(getDbDoc("drinks", id), { active: false });
                showToast("🗑️ 已刪除飲料店");
            }
        };

        function resetDrinkForm() {
            document.getElementById("drink-form").reset();
            document.getElementById("drink-id").value = "";
            document.getElementById("drink-form-title").textContent = "➕ 新增飲料店";
            document.getElementById("btn-submit-drink").textContent = "儲存飲料店";
            document.getElementById("btn-cancel-drink").classList.add("hidden");
        }
        document.getElementById("btn-cancel-drink").onclick = resetDrinkForm;

        // --- 飲料抽籤邏輯 ---
        function updateDrinkDrawStatus() {
            const btn = document.getElementById("btn-draw-drink");
            const info = document.getElementById("drink-candidate-info");
            if (state.drinks.length === 0) {
                info.textContent = `⚠️ 目前沒有飲料店可抽，請先在下方新增！`;
                btn.disabled = true;
            } else {
                info.textContent = `🎯 共有 ${state.drinks.length} 家飲料店準備開抽！`;
                btn.disabled = false;
            }
        }

        document.getElementById("btn-draw-drink").onclick = () => {
            if (state.drinks.length === 0) return;
            
            const btn = document.getElementById("btn-draw-drink");
            const slot = document.getElementById("drink-slot-machine");
            const detail = document.getElementById("drink-detail");
            
            btn.disabled = true;
            btn.textContent = "🔄 抽籤中...";
            slot.classList.add("spinning");
            detail.classList.add("hidden");

            let spins = 0;
            const interval = setInterval(() => {
                const ri = Math.floor(Math.random() * state.drinks.length);
                const currentDrink = state.drinks[ri];
                slot.textContent = `${currentDrink.name} ${currentDrink.branch ? '('+currentDrink.branch+')' : ''}`;
                spins++;

                if (spins >= 25) {
                    clearInterval(interval);
                    finishDrinkDraw(ri);
                }
            }, 80);
        };

        async function finishDrinkDraw(winnerIndex) {
            const slot = document.getElementById("drink-slot-machine");
            const detail = document.getElementById("drink-detail");
            const btn = document.getElementById("btn-draw-drink");
            
            slot.classList.remove("spinning");
            state.selectedDrink = state.drinks[winnerIndex];
            
            slot.innerHTML = `🎉 ${state.selectedDrink.name} <span class="text-xl">(${state.selectedDrink.branch || '無分店'})</span> 🎉`;
            detail.innerHTML = `<p><span class="font-bold text-gray-700">備註：</span> ${state.selectedDrink.note || '無'}</p>`;
            detail.classList.remove("hidden");
            
            btn.disabled = false;
            btn.textContent = "🔄 重新抽一次飲料";

            try {
                await addDoc(getDbCol("drawLogs"), {
                    drawerName: state.selectedDrawer || "大家", 
                    eatMethod: "喝飲料", 
                    restaurantId: state.selectedDrink.id,
                    restaurantName: `${state.selectedDrink.name} ${state.selectedDrink.branch ? '('+state.selectedDrink.branch+')' : ''}`,
                    createdAt: serverTimestamp()
                });
            } catch (err) {}
        }

        // ==========================================
        // 第四頁：分帳功能 (Split Bills)
        // ==========================================
        function updateSplitMembersUI() {
            const payerSelect = document.getElementById("split-payer");
            const currentPayer = payerSelect.value;
            payerSelect.innerHTML = '<option value="" disabled selected>-- 選擇代墊者 --</option>';

            const partContainer = document.getElementById("split-participants");
            const currentlyChecked = Array.from(partContainer.querySelectorAll('input:checked')).map(el => el.value);
            const isInitial = partContainer.innerHTML === '';
            
            partContainer.innerHTML = '';

            state.members.forEach(m => {
                const opt = document.createElement("option");
                opt.value = m.name;
                opt.textContent = m.name;
                payerSelect.appendChild(opt);

                const lbl = document.createElement("label");
                lbl.className = "flex items-center space-x-1 cursor-pointer text-sm w-1/2 sm:w-1/3";
                const isChecked = isInitial ? true : currentlyChecked.includes(m.name);
                lbl.innerHTML = `<input type="checkbox" name="splitMember" value="${m.name}" class="form-checkbox h-4 w-4 text-[#8B5CF6] rounded" ${isChecked ? 'checked' : ''}><span>${m.name}</span>`;
                partContainer.appendChild(lbl);
            });

            if (currentPayer && state.members.some(m => m.name === currentPayer)) {
                payerSelect.value = currentPayer;
            }
        }

        document.getElementById("split-form").onsubmit = async (e) => {
            e.preventDefault();
            
            const checkedMembers = Array.from(document.querySelectorAll('input[name="splitMember"]:checked')).map(cb => cb.value);
            if (checkedMembers.length === 0) {
                document.getElementById('split-participants-error').classList.remove('hidden');
                return;
            }
            document.getElementById('split-participants-error').classList.add('hidden');

            const title = document.getElementById("split-title").value.trim();
            const amount = parseInt(document.getElementById("split-amount").value, 10);
            const payer = document.getElementById("split-payer").value;

            if (!payer || isNaN(amount) || amount <= 0) return;

            const splitAmount = Math.ceil(amount / checkedMembers.length);

            document.getElementById("btn-submit-split").disabled = true;
            try {
                await addDoc(getDbCol("bills"), {
                    title,
                    amount,
                    payer,
                    participants: checkedMembers,
                    splitAmount,
                    createdAt: serverTimestamp(),
                    active: true
                });
                showToast("✅ 分帳紀錄新增成功！");
                document.getElementById("split-form").reset();
                document.querySelectorAll('input[name="splitMember"]').forEach(cb => cb.checked = true);
            } catch (error) { 
                showToast("❌ 新增失敗，請檢查權限", true); 
            }
            document.getElementById("btn-submit-split").disabled = false;
        };

        function renderBills() {
            const DOM_splitList = document.getElementById("split-list");
            const DOM_splitSummary = document.getElementById("split-summary");
            DOM_splitList.innerHTML = "";
            DOM_splitSummary.innerHTML = "";

            if (state.bills.length === 0) {
                DOM_splitList.innerHTML = "<p class='text-center py-6 text-gray-400'>目前沒有分帳紀錄！</p>";
                DOM_splitSummary.innerHTML = "<p class='text-gray-400 text-center w-full py-2'>欠錢還錢！！</p>";
                return;
            }

            // --- 計算最佳化總結算 (最低轉帳次數) ---
            const balances = {};
            state.members.forEach(m => balances[m.name] = 0);
            
            // 如果有不在 member 名單裡的舊資料，也先幫他們初始化為 0
            state.bills.forEach(bill => {
                if (balances[bill.payer] === undefined) balances[bill.payer] = 0;
                bill.participants.forEach(p => {
                    if (balances[p] === undefined) balances[p] = 0;
                });
            });

            // 計算每個人的淨收支
            state.bills.forEach(bill => {
                const payer = bill.payer;
                bill.participants.forEach(p => {
                    if (p !== payer) {
                        balances[p] -= bill.splitAmount; // 欠人錢 (-)
                        balances[payer] += bill.splitAmount; // 別人欠他 (+)
                    }
                });
            });

            // 分離債務人與債權人
            let debtors = [];
            let creditors = [];
            Object.keys(balances).forEach(name => {
                if (balances[name] < 0) debtors.push({ name, amount: -balances[name] });
                else if (balances[name] > 0) creditors.push({ name, amount: balances[name] });
            });

            // 排序以優化大額抵銷 (大額欠款優先給大額代墊)
            debtors.sort((a, b) => b.amount - a.amount);
            creditors.sort((a, b) => b.amount - a.amount);

            const netDebts = [];
            let i = 0, j = 0;
            while (i < debtors.length && j < creditors.length) {
                const debtor = debtors[i];
                const creditor = creditors[j];
                const transferAmount = Math.min(debtor.amount, creditor.amount);
                
                if (transferAmount > 0) {
                    netDebts.push({ debtor: debtor.name, creditor: creditor.name, amount: transferAmount });
                }
                
                debtor.amount -= transferAmount;
                creditor.amount -= transferAmount;
                
                if (debtor.amount === 0) i++;
                if (creditor.amount === 0) j++;
            }

            if (netDebts.length === 0) {
                DOM_splitSummary.innerHTML = "<p class='text-gray-400 text-center w-full py-2'>欠錢還錢！！</p>";
            } else {
                netDebts.forEach(debt => {
                    const el = document.createElement("div");
                    el.className = "bg-[#F3E8FF] border border-[#C4B5FD] px-4 py-3 rounded-lg text-sm shadow-sm flex items-center justify-between w-full lg:w-auto gap-4";
                    el.innerHTML = `
                        <div>
                            <span class="font-bold text-[#3E4A59]">${debt.debtor}</span> ➡️ 給 <span class="font-bold text-[#3E4A59]">${debt.creditor}</span>：<span class="font-bold text-red-500 text-lg">$${debt.amount}</span>
                        </div>
                        <button class="bg-[#8B5CF6] text-white px-3 py-1 rounded hover:bg-[#7C3AED] transition-colors text-xs font-bold whitespace-nowrap" onclick="settleDebt('${debt.debtor}', '${debt.creditor}', ${debt.amount})">已結清</button>
                    `;
                    DOM_splitSummary.appendChild(el);
                });
            }

            // --- 渲染詳細分帳紀錄 ---
            state.bills.forEach(bill => {
                const li = document.createElement("li");
                li.className = "flex flex-col bg-gray-50 border border-gray-200 p-4 rounded-lg gap-2 relative";
                
                let dateObj = new Date();
                if (bill.createdAt?.toDate) dateObj = bill.createdAt.toDate();
                else if (bill.createdAt?.toMillis) dateObj = new Date(bill.createdAt.toMillis());

                // 結清的紀錄換個綠色顯示會比較清楚
                const isSettlement = bill.title === "✅ 結清轉帳";

                const owesList = bill.participants
                    .filter(p => p !== bill.payer) 
                    .map(p => `<span class="bg-white border border-gray-200 px-2 py-1 rounded text-sm shadow-sm inline-block mb-1 mr-1 text-gray-700"><b class="text-[#8B5CF6]">${p}</b> 應給 ${bill.payer} <span class="font-bold text-red-500">$${bill.splitAmount}</span></span>`)
                    .join('');

                const owesHtml = owesList ? `<div class="mt-2 pt-2 border-t border-gray-200">${owesList}</div>` : `<div class="mt-2 text-sm text-gray-500">無人需分攤 (全由 ${bill.payer} 自付)</div>`;

                li.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-bold text-lg ${isSettlement ? 'text-green-600' : 'text-[#3E4A59]'}">${bill.title} <span class="text-sm font-bold text-[#8B5CF6] ml-2">總計: $${bill.amount}</span></h4>
                            <p class="text-xs text-gray-500 mt-1">🕒 ${formatDate(dateObj)} ． 代墊者: <span class="font-bold">${bill.payer}</span> ． 每人分攤: $${bill.splitAmount}</p>
                        </div>
                        <button class="bg-gray-200 text-gray-500 px-3 py-1 rounded hover:bg-red-500 hover:text-white transition-colors text-xs font-bold" onclick="deleteBill('${bill.id}')">刪除</button>
                    </div>
                    ${!isSettlement ? owesHtml : ''}
                `;
                DOM_splitList.appendChild(li);
            });
        }

        window.deleteBill = async (id) => {
            if(confirm("確定刪除這筆分帳紀錄嗎？")) {
                await updateDoc(getDbDoc("bills", id), { active: false });
                showToast("🗑️ 已刪除分帳紀錄");
            }
        };

        window.settleDebt = async (debtor, creditor, amount) => {
            if(confirm(`確定 ${debtor} 已經轉帳給 ${creditor} $${amount} 了嗎？\n(這將會新增一筆對沖的結清紀錄)`)) {
                try {
                    await addDoc(getDbCol("bills"), {
                        title: "✅ 結清轉帳",
                        amount: parseInt(amount, 10),
                        payer: debtor, // 欠款者把錢拿出來
                        participants: [creditor], // 債權人收到錢
                        splitAmount: parseInt(amount, 10),
                        createdAt: serverTimestamp(),
                        active: true
                    });
                    showToast("✅ 結清成功！");
                } catch (error) { 
                    showToast("❌ 結清失敗，請檢查權限", true); 
                }
            }
        };

        // 啟動系統
        initSystem();

    </script>
